components:
  schemas:
    Anamnesis:
      type: object
      description: Serializer completo para Anamnesis
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
          title: Paciente
          description: ID do paciente para quem a anamnese está sendo criada
        patient_name:
          type: string
          readOnly: true
          description: Nome do paciente
        patient_cpf:
          type: string
          readOnly: true
          description: CPF do paciente
        caregiver:
          type: integer
          nullable: true
          title: Cuidador
          description: ID do cuidador que está criando a anamnese
        caregiver_name:
          type: string
          readOnly: true
          description: Nome do cuidador
        main_diagnosis:
          type: string
          nullable: true
          title: Diagnóstico Principal
          description: Diagnóstico médico principal do paciente
          maxLength: 200
        associated_conditions:
          type: string
          nullable: true
          title: Condições Associadas
          description: Outras condições médicas ou comorbidades
        allergies:
          type: string
          nullable: true
          title: Alergias
          description: Alergias conhecidas do paciente
        medications:
          type: string
          nullable: true
          title: Medicações
          description: Medicamentos em uso atual
        communication_methods:
          type: string
          nullable: true
          title: Formas de Comunicação
          description: Métodos de comunicação utilizados pelo paciente
        spoken_words:
          type: string
          nullable: true
          title: Palavras Faladas
          description: Palavras que o paciente consegue falar ou entender
        preferred_pictograms:
          type: string
          nullable: true
          title: Pictogramas Preferidos
          description: Pictogramas ou símbolos preferidos pelo paciente
        dietary_restrictions:
          type: string
          nullable: true
          title: Restrições Alimentares
          description: Alimentos que devem ser evitados ou restrições específicas
        food_preferences:
          type: string
          nullable: true
          title: Preferências Alimentares
          description: Alimentos favoritos ou preferências do paciente
        feeding_difficulties:
          type: string
          nullable: true
          title: Dificuldades na Alimentação
          description: Problemas ou dificuldades relacionadas à alimentação
        needs_expression:
          type: string
          nullable: true
          title: Expressão de Necessidades
          description: Como o paciente expressa suas necessidades e desejos
        frustration_reactions:
          type: string
          nullable: true
          title: Reações à Frustração
          description: Como o paciente reage quando frustrado ou irritado
        general_observations:
          type: string
          nullable: true
          title: Observações Gerais
          description: Observações adicionais importantes sobre o paciente
        is_active:
          type: boolean
          title: Ativo
          description: Indica se o registro está ativo no sistema
        created_by:
          type: integer
          readOnly: true
          nullable: true
          title: Criado por
          description: Usuário que criou o registro
        created_by_username:
          type: string
          readOnly: true
          description: Nome do usuário que criou o registro
