openapi: 3.0.3
info:
  title: Smart CAA API
  version: 1.0.0
  description: API para o sistema Smart CAA (Comunicação Aumentativa e Alternativa)
paths:
  /api/anamnesis/:
    get:
      operationId: api_anamnesis_list
      description: Lista todas as anamneses ativas no sistema. **Requer autenticação.**
      summary: Listar Anamneses
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Anamnesis
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnamnesisListList'
          description: ''
    post:
      operationId: api_anamnesis_create
      description: Cria uma nova anamnese para um paciente. Apenas uma anamnese por
        paciente/cuidador é permitida. **Requer autenticação.**
      summary: Criar Anamnese
      tags:
      - Anamnesis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anamnesis'
          description: ''
  /api/anamnesis/{id}/:
    get:
      operationId: api_anamnesis_retrieve
      description: Retorna os detalhes de uma anamnese específica
      summary: Obter Anamnese
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Anamnesis
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anamnesis'
          description: ''
    put:
      operationId: api_anamnesis_update
      description: Atualiza completamente uma anamnese específica
      summary: Atualizar Anamnese
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Anamnesis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnamnesisRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anamnesis'
          description: ''
    patch:
      operationId: api_anamnesis_partial_update
      description: Atualiza parcialmente uma anamnese específica
      summary: Atualizar Parcialmente Anamnese
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Anamnesis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAnamnesisRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAnamnesisRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAnamnesisRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anamnesis'
          description: ''
    delete:
      operationId: api_anamnesis_destroy
      description: Remove uma anamnese do sistema (soft delete)
      summary: Deletar Anamnese
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Anamnesis
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/anamnesis/get/:
    get:
      operationId: api_anamnesis_get_retrieve
      description: Retorna a anamnese usando IDs do paciente e cuidador como query
        parameters
      summary: Obter Anamnese por IDs
      parameters:
      - in: query
        name: caregiver_id
        schema:
          type: integer
        description: ID do cuidador
        required: true
      - in: query
        name: patient_id
        schema:
          type: integer
        description: ID do paciente
        required: true
      tags:
      - Anamnesis
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anamnesis'
          description: ''
  /api/attachments/:
    get:
      operationId: api_attachments_list
      description: Lista todos os anexos, com filtro opcional por paciente e por histórico.
      summary: Listar Anexos
      parameters:
      - in: query
        name: history
        schema:
          type: integer
        description: Filtrar anexos por histórico (ID). Alias legado de `history_id`.
      - in: query
        name: history_id
        schema:
          type: integer
        description: Filtrar anexos por histórico (ID). Parâmetro recomendado.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: patient
        schema:
          type: integer
        description: Filtrar anexos por paciente (ID)
      tags:
      - Attachment
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttachmentList'
          description: ''
    post:
      operationId: api_attachments_create
      description: Cria um novo anexo para um paciente via `multipart/form-data`.
        O campo `history` é opcional e deve receber o ID de um histórico do mesmo
        paciente, quando informado.
      summary: Criar Anexo
      tags:
      - Attachment
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttachmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
        '400':
          description: Dados inválidos
  /api/attachments/{id}/:
    get:
      operationId: api_attachments_retrieve
      description: Utilizado para obter um anexo específico.
      summary: Obter Anexo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attachment
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
    put:
      operationId: api_attachments_update
      description: Atualiza completamente um anexo. O campo `history` continua opcional.
      summary: Atualizar Anexo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attachment
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttachmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
        '400':
          description: Dados inválidos
    patch:
      operationId: api_attachments_partial_update
      description: Atualiza parcialmente um anexo. Você pode enviar `history` com
        um ID válido ou `null`.
      summary: Atualizar Parcialmente Anexo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attachment
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttachmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttachmentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
        '400':
          description: Dados inválidos
    delete:
      operationId: api_attachments_destroy
      description: Exclui um anexo pelo ID
      summary: Excluir Anexo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attachment
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Anexo excluído com sucesso
  /api/caregivers/:
    get:
      operationId: api_caregivers_list
      description: Utilizado para listar todos os cuidadores cadastrados no sistema.
        **Requer autenticação.**
      summary: Listar Cuidadores
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Caregiver
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCaregiverList'
          description: ''
    post:
      operationId: api_caregivers_create
      description: Utilizado para cadastrar um novo cuidador. Se o CPF já existir,
        a pessoa será marcada também como cuidador. Este endpoint não requer autenticação.
      summary: Cadastrar Cuidador
      tags:
      - Caregiver
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Caregiver'
          description: ''
  /api/caregivers/{caregiver_id}/anamnesis/:
    get:
      operationId: api_caregivers_anamnesis_list
      description: Lista todas as anamneses criadas por um cuidador específico
      summary: Listar Anamneses de um Cuidador
      parameters:
      - in: path
        name: caregiver_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Anamnesis
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCaregiverAnamnesisList'
          description: ''
  /api/caregivers/{caregiver_id}/patients/:
    get:
      operationId: api_caregivers_patients_list
      description: Utilizado para listar todos os pacientes vinculados a um cuidador
        específico. Retorna primeiro os relacionamentos ativos, depois os inativos,
        ordenados por data de criação.
      summary: Listar Pacientes do Cuidador
      parameters:
      - in: path
        name: caregiver_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Caregiver
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPatientForCaregiverList'
          description: ''
  /api/caregivers/{id}/:
    get:
      operationId: api_caregivers_retrieve
      description: Utilizado para obter os dados de um cuidador específico
      summary: Obter Cuidador
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Caregiver
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Caregiver'
          description: ''
    put:
      operationId: api_caregivers_update
      description: Utilizado para atualizar completamente os dados de um cuidador
      summary: Atualizar Cuidador
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Caregiver
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CaregiverRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Caregiver'
          description: ''
    patch:
      operationId: api_caregivers_partial_update
      description: Utilizado para atualizar parcialmente os dados de um cuidador
      summary: Atualizar Parcialmente Cuidador
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Caregiver
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCaregiverRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCaregiverRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCaregiverRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Caregiver'
          description: ''
    delete:
      operationId: api_caregivers_destroy
      description: Utilizado para deletar um cuidador do sistema
      summary: Deletar Cuidador
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Caregiver
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/everyday-categories/:
    get:
      operationId: api_everyday_categories_list
      description: Utilizado para listar todas as categorias do cotidiano
      summary: Listar Categorias do Cotidiano
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - EverydayCategory
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEverydayCategoryList'
          description: ''
    post:
      operationId: api_everyday_categories_create
      description: Utilizado para criar uma nova categoria do cotidiano
      summary: Criar Categoria do Cotidiano
      tags:
      - EverydayCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EverydayCategory'
          description: ''
  /api/everyday-categories/{id}/:
    get:
      operationId: api_everyday_categories_retrieve
      description: Utilizado para obter uma categoria do cotidiano específica
      summary: Obter Categoria do Cotidiano
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - EverydayCategory
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EverydayCategory'
          description: ''
    put:
      operationId: api_everyday_categories_update
      description: Utilizado para atualizar completamente uma categoria do cotidiano
      summary: Atualizar Categoria do Cotidiano
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - EverydayCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EverydayCategoryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EverydayCategory'
          description: ''
    patch:
      operationId: api_everyday_categories_partial_update
      description: Utilizado para atualizar parcialmente uma categoria do cotidiano
      summary: Atualizar Parcialmente Categoria do Cotidiano
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - EverydayCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEverydayCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEverydayCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEverydayCategoryRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EverydayCategory'
          description: ''
    delete:
      operationId: api_everyday_categories_destroy
      description: Utilizado para deletar uma categoria do cotidiano
      summary: Deletar Categoria do Cotidiano
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - EverydayCategory
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/histories/:
    get:
      operationId: api_histories_list
      description: Lista históricos ativos. Permite filtros por `patient_id` e `caregiver_id`
        via query parameters e retorna `attachment_count` para cada item.
      summary: Listar Históricos
      parameters:
      - in: query
        name: caregiver_id
        schema:
          type: integer
        description: Filtra históricos pelo ID do cuidador.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: patient_id
        schema:
          type: integer
        description: Filtra históricos pelo ID do paciente.
      tags:
      - History
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHistoryList'
          description: ''
    post:
      operationId: api_histories_create
      description: Cria um novo histórico para paciente e cuidador.
      summary: Criar Histórico
      tags:
      - History
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
          description: ''
  /api/histories/{id}/:
    get:
      operationId: api_histories_retrieve
      description: Retorna os detalhes de um histórico específico.
      summary: Obter Histórico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - History
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
          description: ''
    put:
      operationId: api_histories_update
      description: Atualiza completamente um histórico específico.
      summary: Atualizar Histórico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - History
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
          description: ''
    patch:
      operationId: api_histories_partial_update
      description: Atualiza parcialmente um histórico específico.
      summary: Atualizar Parcialmente Histórico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - History
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHistoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHistoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHistoryRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
          description: ''
    delete:
      operationId: api_histories_destroy
      description: Remove um histórico do sistema (soft delete).
      summary: Deletar Histórico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - History
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/patients/:
    get:
      operationId: api_patients_list
      description: Utilizado para listar todos os pacientes cadastrados no sistema.
        Opcionalmente pode filtrar por CPF usando o parâmetro ?cpf=12345678901. **Requer
        autenticação.**
      summary: Listar Pacientes
      parameters:
      - in: query
        name: cpf
        schema:
          type: string
        description: CPF do paciente para filtrar (apenas números, sem formatação)
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Patient
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPatientList'
          description: ''
    post:
      operationId: api_patients_create
      description: Utilizado para cadastrar um novo paciente. Se o CPF já existir,
        a pessoa será marcada também como paciente. Este endpoint não requer autenticação.
      summary: Cadastrar Paciente
      tags:
      - Patient
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatientRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatientRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
